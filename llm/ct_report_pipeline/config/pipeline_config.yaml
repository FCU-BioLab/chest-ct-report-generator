# Pipeline Configuration

# Segmentation Model Settings
segmentation_model: "medsam2"

# MedSAM2 Configuration
medsam2:
  root: "${REPO_ROOT}/segmentation/MedSAM2"
  checkpoint: "${PIPELINE_ROOT}/segmentation/MedSAM2_best_model.pth"
  config: "sam2.1_hiera_t512.yaml"

# Dataset Split (for test evaluation)
dataset_split: "${REPO_ROOT}/segmentation/result/dataset_split.json"

# LLM Configuration
llm:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  lora_path: "${PIPELINE_ROOT}/assets/models/lora_ct_report/lora_20251220_000011/final"
  load_in_8bit: false
  max_length: 2048
  temperature: 0.3

# Data Paths
lndb_root: "${REPO_ROOT}/dataset/LNDb"
output_dir: "${PIPELINE_ROOT}/outputs"
processed_data_dir: "${PIPELINE_ROOT}/processed_data"

# Feature Extraction
encoder_dim: 512
llm_dim: 4096

# Device
device: "cuda"
