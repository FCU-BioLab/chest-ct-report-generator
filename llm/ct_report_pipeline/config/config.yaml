# CT Report Pipeline - Configuration
project_root: "${PIPELINE_ROOT}"

datasets:
  lndb:
    root: "${REPO_ROOT}/dataset/LNDb"
    ct_dir: "data/LNDb-0001_4/data"
    masks_dir: "masks/masks"
    lung_masks_dir: "lung_masks"
    csv_dir: "trainset_csv"
    trainNodules_gt: "trainset_csv/trainNodules_gt.csv"

  msd_lung:
    root: "${REPO_ROOT}/dataset/MSD/Task06_Lung"
    images_dir: "imagesTr"
    labels_dir: "labelsTr"
    lung_masks_dir: "lung_masks"
    processed_dir: "processed"
    dataset_json: "dataset.json"

  luna16:
    root: "${REPO_ROOT}/dataset/LUNA16"
    annotations_csv: "annotations.csv"
    candidates_csv: "candidates.csv"

medsam2:
  root: "${REPO_ROOT}/segmentation/MedSAM2"
  config: "sam2.1_hiera_t512.yaml"
  checkpoints:
    pretrained: "${REPO_ROOT}/segmentation/MedSAM2/checkpoints/MedSAM2_CTLesion.pt"
    finetuned: "${PIPELINE_ROOT}/segmentation/MedSAM2_best_model.pth"
    latest: "${REPO_ROOT}/segmentation/MedSAM2/checkpoints/MedSAM2_latest.pt"
  default_checkpoint: "pretrained"

llm:
  model_name: "C:/GitHub/chest-ct-report-generator/models/llm/Llama-3.2-1B-Instruct"
  load_in_8bit: false
  max_length: 2048
  temperature: 0.3
  lora_weights:
    base_dir: "${PIPELINE_ROOT}/assets/models/lora_ct_report"
    latest: "${PIPELINE_ROOT}/assets/models/lora_ct_report/llama32_20260520"

outputs:
  root: "${PIPELINE_ROOT}/outputs"
  processed_data: "${PIPELINE_ROOT}/processed_data"
  segmentation_results: "${REPO_ROOT}/segmentation/result"
  training_data: "${PIPELINE_ROOT}/assets/data"

dataset_split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  saved_split: "${REPO_ROOT}/segmentation/result/dataset_split.json"

training:
  segmentation:
    epochs: 100
    batch_size: 32
    learning_rate: 5e-6
    weight_decay: 1e-4
    early_stopping_patience: 50
    warmup_epochs: 5
    num_workers: 8
    accumulation_steps: 1
    loss_type: "combined"
  llm_finetune:
    epochs: 3
    batch_size: 4
    learning_rate: 2e-5
    gradient_accumulation_steps: 4

preprocessing:
  window:
    lung:
      center: -600
      width: 1500
    mediastinum:
      center: 40
      width: 400
  min_nodule_diameter: 4.0
  augmentation:
    enabled: true
    rotation_prob: 0.5
    flip_prob: 0.5
    gamma_prob: 0.3
    noise_prob: 0.3
    contrast_prob: 0.4

features:
  encoder_dim: 512
  llm_dim: 4096

device: "cuda"

reports:
  raw_reports: "${REPO_ROOT}/report_data/splited_reports"
  processed_reports: "${PIPELINE_ROOT}/assets/data/finetune_real_reports.jsonl"
